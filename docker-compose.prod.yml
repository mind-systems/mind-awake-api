version: '3.8'

services:
  database_prod_host:
    image: postgres:15-alpine
    container_name: mind_api_database_prod_host
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - database_prod_volume:/var/lib/postgresql/data
    ports:
      - "${HOST_DB_PORT}:${CONTAINER_DB_PORT}"
    networks:
      - network_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mind_api_prod:
    image: mind_api_prod:latest
    container_name: mind_api_prod
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "${HOST_API_PORT}:${CONTAINER_API_PORT}"
    depends_on:
      database_prod_host:
        condition: service_healthy
    networks:
      - network_prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  database_prod_volume:

networks:
  network_prod:
    driver: bridge
