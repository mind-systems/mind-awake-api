version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "${HOST_DB_PORT}:${CONTAINER_DB_PORT}"
    networks:
      - app_network_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nestjs:
    image: mind-awake-api-prod:latest
    container_name: nestjs_app_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "${HOST_API_PORT}:${CONTAINER_API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network_prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_prod_data:

networks:
  app_network_prod:
    driver: bridge
