version: '3.8'

services:
  mind_database_dev_host:
    image: postgres:15-alpine
    container_name: mind_api_database_dev_host
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - database_dev_volume:/var/lib/postgresql/data
    ports:
      - "${HOST_DB_PORT}:${CONTAINER_DB_PORT}"
    networks:
      - network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mind_api_dev:
    image: mind_api_dev:latest
    container_name: mind_api_dev
    build:
      context: .
      target: dev
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "${HOST_API_PORT}:${CONTAINER_API_PORT}"
    depends_on:
      mind_database_dev_host:
        condition: service_healthy
    networks:
      - network_dev
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:${CONTAINER_API_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  database_dev_volume:

networks:
  network_dev:
    driver: bridge
