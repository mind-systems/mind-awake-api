services:
  postgres:
    image: postgres:15-alpine
    #container_name: postgres_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${HOST_DB_PORT}:${CONTAINER_DB_PORT}"
    networks:
      - app_network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nestjs:
    image: mind-awake-api-dev:latest
    container_name: nestjs_app_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "${HOST_API_PORT}:${CONTAINER_API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network_dev
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:${CONTAINER_API_PORT} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_dev_data:

networks:
  app_network_dev:
    driver: bridge
