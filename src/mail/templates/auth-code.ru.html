<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Быстрый вход</title>

    <style>
        :root {
          color-scheme: light dark;
        }

        body {
          margin: 0;
          padding: 0;
          background: #f4f6f8;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
          max-width: 520px;
          margin: 40px auto;
          background: #ffffff;
          border-radius: 14px;
          padding: 40px 32px;
        }

        .title {
          font-size: 22px;
          font-weight: 600;
          color: #111111;
          text-align: center;
          margin-bottom: 24px;
        }

        .text {
          font-size: 15px;
          color: #444444;
          text-align: center;
          line-height: 1.6;
          margin-bottom: 32px;
        }

        .button {
          display: inline-block;
          padding: 16px 32px;
          border-radius: 10px;
          font-size: 16px;
          font-weight: 600;
          color: #ffffff !important;
          text-decoration: none;
          background-color: #3686D0; /* light mode */
        }

        .divider {
          height: 1px;
          background: #e6e9ed;
          margin: 32px 0;
        }

        .code {
          display: inline-block;
          padding: 14px 24px;
          border-radius: 8px;
          background: #f1f5f9;
          font-size: 20px;
          letter-spacing: 4px;
          font-weight: 700;
          color: #083752;
        }

        .footer {
          font-size: 12px;
          color: #999999;
          text-align: center;
          margin-top: 24px;
        }

        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
          body {
            background: #0f1720;
          }

          .container {
            background: #1a2430;
          }

          .title {
            color: #ffffff;
          }

          .text {
            color: #cbd5e1;
          }

          .divider {
            background: #2a3a4a;
          }

          .code {
            background: #243140;
            color: #ffffff;
          }

          .footer {
            color: #94a3b8;
          }

          .button {
            background-color: #083752; /* dark mode */
          }
        }
    </style>
</head>

<body>
<div class="container">

    <div class="title">Безопасный вход</div>

    <div class="text">
        Нажмите кнопку ниже, чтобы войти мгновенно.<br/>
        Ссылка действительна {{expires_in}} минут.
    </div>

    <div style="text-align:center;">
        <a href="{{magic_link}}" class="button">
            Войти одним нажатием
        </a>
    </div>

    <div class="divider"></div>

    <div class="text" style="margin-bottom:12px;">
        Открываете письмо на другом устройстве?
        Введите этот код в приложении:
    </div>

    <div style="text-align:center;">
        <div class="code">
            {{manual_code}}
        </div>
    </div>

    <div class="footer">
        Если вы не запрашивали вход, просто проигнорируйте это письмо.
    </div>

</div>
</body>
</html>
